<main>

  <h1>Changelog</h1>
  <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:2rem;">
    Pulled live from <a href="https://github.com/clq-sh/CLQ/releases">GitHub Releases</a>.
    This page always reflects the current release state — no manual sync required.
  </p>

  <div id="releases-list">
    <p class="loading" id="loading-msg">Loading releases…</p>
  </div>

</main>

<!-- marked.js for markdown rendering (changelog release bodies) -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>

<script>
(async function loadReleases() {
  const container = document.getElementById("releases-list")
  const loadingMsg = document.getElementById("loading-msg")

  // Session cache so repeated tab visits don't hammer the API
  const CACHE_KEY = "clq-releases-v1"
  const CACHE_TTL = 5 * 60 * 1000 // 5 minutes

  let releases = null

  try {
    const cached = sessionStorage.getItem(CACHE_KEY)
    if (cached) {
      const { ts, data } = JSON.parse(cached)
      if (Date.now() - ts < CACHE_TTL) {
        releases = data
      }
    }
  } catch (_) { /* sessionStorage unavailable or corrupt */ }

  if (!releases) {
    try {
      const res = await fetch(
        "https://api.github.com/repos/clq-sh/CLQ/releases",
        { headers: { Accept: "application/vnd.github+json" } }
      )

      if (res.status === 403 || res.status === 429) {
        // Rate limited
        const reset = res.headers.get("X-RateLimit-Reset")
        const resetTime = reset
          ? new Date(parseInt(reset, 10) * 1000).toLocaleTimeString()
          : "a few minutes"
        showError(
          `GitHub API rate limit reached. Try again after ${resetTime}.`,
          true
        )
        return
      }

      if (!res.ok) {
        showError(`GitHub API returned ${res.status}. Try again later.`, true)
        return
      }

      releases = await res.json()

      try {
        sessionStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: releases }))
      } catch (_) { /* ignore storage failure */ }

    } catch (err) {
      showError(
        "Could not reach GitHub. Check your connection or view releases directly on GitHub.",
        true
      )
      return
    }
  }

  if (!releases || releases.length === 0) {
    loadingMsg.textContent = "No releases published yet."
    return
  }

  loadingMsg.remove()

  for (const release of releases) {
    const div = document.createElement("div")
    div.className = "release"

    const date = new Date(release.published_at || release.created_at)
    const dateStr = date.toLocaleDateString("en-US", {
      year: "numeric", month: "long", day: "numeric"
    })

    const bodyHtml = release.body
      ? marked.parse(release.body)
      : "<p style=\"color:var(--text-muted)\"><em>No release notes.</em></p>"

    div.innerHTML = `
      <div class="release-header">
        <a class="release-tag" href="${escHtml(release.html_url)}" target="_blank" rel="noopener">
          ${escHtml(release.tag_name)}
        </a>
        ${release.prerelease ? '<span class="badge badge-medium">pre-release</span>' : ""}
        <span class="release-date">${escHtml(dateStr)}</span>
      </div>
      <div class="release-body">${bodyHtml}</div>
    `
    container.appendChild(div)
  }

  function showError(message, showLink) {
    loadingMsg.innerHTML = showLink
      ? `${escHtml(message)} &nbsp;<a href="https://github.com/clq-sh/CLQ/releases">View on GitHub →</a>`
      : escHtml(message)
    loadingMsg.style.color = "var(--text-muted)"
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
  }
})()
</script>
