name: Publish Workspace Packages

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # Upgraded to v4 to fix compatibility issues with pnpm 9
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all workspace targets
        run: pnpm -r run build

      # --- Step A: Deploy to GitHub Packages ---
      - name: Route and Authenticate GitHub Registry
        run: |
          echo "@clq-sh:registry=https://npm.pkg.github.com" > ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc

      - name: Publish all to GitHub Packages
        run: pnpm -r publish --no-git-checks --registry=https://npm.pkg.github.com

      # --- Step B: Deploy to Public npm Registry ---
      - name: Route and Authenticate Public npm Registry
        run: |
          echo "registry=https://registry.npmjs.org/" > ~/.npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      - name: Publish all to Public npm
        run: pnpm -r publish --access public --no-git-checks --registry=https://registry.npmjs.org/